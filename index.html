<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>球隊例賽報名</title>
<meta name="theme-color" content="#14532d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="例賽報名">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --fairway:#14532d; --fairway-2:#2d6a4f; --green-soft:#e7efe6;
    --paper:#f7f4ec; --paper-2:#fffdf7; --ink:#1d211c; --ink-soft:#5a6157;
    --line:#d9d6c8; --flag:#bc4b3c; --gold:#b08534;
    --shadow:0 1px 2px rgba(20,30,20,.06),0 8px 24px rgba(20,30,20,.07);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    color:var(--ink); font-size:17px; line-height:1.55; -webkit-font-smoothing:antialiased; -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:540px;margin:0 auto;padding:18px 16px calc(48px + env(safe-area-inset-bottom));}
  .center{text-align:center;color:var(--ink-soft);padding:70px 20px;}
  .spinner{width:34px;height:34px;border:3px solid var(--green-soft);border-top-color:var(--fairway-2);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .masthead{background:linear-gradient(160deg,var(--fairway),var(--fairway-2));color:#f4f7f0;padding:calc(20px + env(safe-area-inset-top)) 20px 22px;position:relative}
  .masthead .flag{position:absolute;top:16px;right:18px;width:30px;height:30px}
  .eyebrow{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#b9d3c0;margin:0 0 6px}
  .title{font-family:Georgia,"Times New Roman","Noto Serif TC",serif;font-size:28px;font-weight:700;margin:0;line-height:1.2}
  .title-zh{font-size:18.5px;font-weight:600;margin:4px 0 0;color:#dce8df}

  .meta{padding:6px 20px 14px}
  .meta-row{display:flex;align-items:baseline;gap:12px;padding:9px 0;border-bottom:1px solid #efece0}
  .meta-row:last-child{border-bottom:0}
  .meta-k{flex:0 0 60px;font-size:14px;color:var(--ink-soft);letter-spacing:.04em}
  .meta-v{flex:1;font-size:16.5px;font-weight:600}
  .meta-v.fee{color:var(--fairway-2)}
  .meta-v.tee{color:var(--flag)}

  .countstrip{display:flex;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin:16px 0}
  .cstat{flex:1;background:var(--paper-2);padding:14px 6px;text-align:center}
  .cstat b{display:block;font-size:24px;font-family:Georgia,serif;color:var(--fairway);line-height:1}
  .cstat span{display:block;margin-top:3px;font-size:12px;color:var(--ink-soft);letter-spacing:.02em;line-height:1.25}
  .cstat.full b{color:var(--flag)}

  .youbar{display:flex;flex-wrap:wrap;align-items:center;gap:11px;background:var(--green-soft);border:1px solid #cfe0d2;border-radius:12px;padding:12px 14px;margin:16px 0}
  .youbar .who{min-width:0}
  .youbar .badge{margin-left:auto}
  .ava{flex:0 0 38px;height:38px;border-radius:50%;background:var(--fairway);color:#fff;display:grid;place-items:center;font-weight:700;font-size:17.5px;overflow:hidden}
  .ava img{width:100%;height:100%;object-fit:cover}
  .youbar .who{flex:1;min-width:0}
  .youbar .who b{font-size:19px}
  .youbar .who small{display:inline;font-size:15px;color:var(--ink-soft)}
  .badge{flex:0 0 auto;font-size:13px;font-weight:700;padding:5px 10px;border-radius:20px}
  .badge.in{background:var(--fairway);color:#fff}
  .badge.out{background:#efe6d4;color:var(--gold)}

  .section-label{font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:26px 0 10px;display:flex;align-items:center;gap:8px}
  .admsec{margin:26px 0 0}
  .admsec>summary{cursor:pointer;list-style:none;font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 10px;display:flex;align-items:center}
  .admsec>summary::-webkit-details-marker{display:none}
  .admsec>summary::after{content:"展開 ▾";margin-left:auto;font-size:12px;letter-spacing:.02em;text-transform:none;color:var(--fairway)}
  .admsec[open]>summary::after{content:"收合 ▴"}
  .adminzone{background:#e9eef2;border:1px solid #ccdae3;border-radius:14px;padding:6px 12px 14px;margin:22px 0}
  .adminzone::before{content:"🔒 管理員專區(僅你看得到)";display:block;font-size:13px;font-weight:700;color:#42637a;letter-spacing:.04em;margin:8px 2px 2px}
  .adminzone .section-label{margin-top:16px;color:#52708a}
  .adminzone .admsec{margin-top:16px}
  .adminzone .admsec>summary{color:#42637a}
  .section-label::before{content:"";width:18px;height:2px;background:var(--gold)}

  .panel{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:13.5px;color:var(--ink-soft);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;font-family:inherit;font-size:16px;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:11px 12px}
  .field textarea{resize:vertical;min-height:44px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--fairway-2);background:#fff;box-shadow:0 0 0 3px rgba(45,106,79,.12)}
  .row2{display:flex;gap:10px}.row2 .field{flex:1}

  .btn{width:100%;font-family:inherit;font-size:17.5px;font-weight:700;letter-spacing:.04em;color:#f4f7f0;background:var(--fairway);border:none;border-radius:10px;padding:13px;cursor:pointer;transition:background .15s,transform .05s}
  .btn:hover{background:#0f3d22}.btn:active{transform:translateY(1px)}
  .btn[disabled]{background:#9aa79b;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--flag);border:1px solid #e8cfca}
  .btn.ghost:hover{background:#fbeeec}
  .btn.sm{font-size:15px;padding:10px}
  .btnrow{display:flex;gap:10px;margin-top:4px}
  .formnote{font-size:13px;color:var(--ink-soft);text-align:center;margin-top:10px}

  .player{display:flex;align-items:center;gap:12px;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;box-shadow:var(--shadow)}
  .player.me{border-color:var(--fairway-2);box-shadow:0 0 0 2px rgba(45,106,79,.14)}
  .player.wait{background:#fbf7ef;border-style:dashed}
  .pnum{flex:0 0 26px;height:26px;border-radius:50%;background:var(--green-soft);color:var(--fairway);font-size:14px;font-weight:700;display:grid;place-items:center}
  .player.wait .pnum{background:#f3e6cf;color:var(--gold)}
  .pinfo{flex:1;min-width:0}
  .pname{font-size:16.5px;font-weight:700}
  .pname .tag{font-size:12px;font-weight:600;margin-left:6px}
  .pname .tag.me{color:var(--fairway-2)} .pname .tag.wait{color:var(--gold)}
  .pmeta{font-size:13px;color:var(--ink-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .empty{text-align:center;color:var(--ink-soft);font-size:15px;padding:26px 14px;border:1px dashed var(--line);border-radius:12px;background:var(--paper-2)}
  .footer{margin-top:26px;text-align:center;font-size:13px;color:var(--ink-soft)}
  .footer button{font-family:inherit;font-size:13px;color:var(--ink-soft);background:none;border:none;text-decoration:underline;cursor:pointer;margin:0 6px}
  .err{background:#fbeeec;border:1px solid #e8cfca;color:#8a3328;border-radius:10px;padding:12px 14px;font-size:15px;margin:14px 0}
  .toast{position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:15px;padding:11px 18px;border-radius:10px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:50;max-width:90%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .stale{background:#fbf3e0;border:1px solid #e9d6a8;color:#8a6516;border-radius:10px;padding:9px 12px;font-size:14px;margin-bottom:10px}
  .ggrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start}
  .ggrid .grp{margin-bottom:0}
  .grp{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:0;margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
  .grp.me{border-color:var(--fairway-2);box-shadow:0 0 0 2px rgba(45,106,79,.14)}
  .grphead{display:flex;justify-content:space-between;align-items:center;background:var(--green-soft);padding:8px 13px;font-size:15px}
  .grp.me .grphead{background:var(--fairway);color:#fff}
  .grphead span{font-size:14px;font-weight:700;font-family:Georgia,serif}
  .grpp{display:flex;align-items:center;gap:8px;padding:9px 13px;border-top:1px solid #efece0;font-size:15.5px}
  .grpp small{color:var(--ink-soft);font-size:13px}
  .grpp .tag.me{font-size:12px;font-weight:600;color:var(--fairway-2)}
  .hcplist{font-size:14px;color:var(--ink-soft);margin:8px 0 0;max-height:160px;overflow:auto}
  .hcplist div{display:flex;justify-content:space-between;padding:4px 2px;border-bottom:1px solid #efece0}
  .hcplist b{color:var(--ink);font-weight:600}
  .rankhead,.rankrow{display:flex;align-items:center;gap:6px;font-size:15px;padding:8px 10px}
  .rankhead{font-size:13px;color:var(--ink-soft);letter-spacing:.04em}
  .rankrow{background:var(--paper-2);border:1px solid var(--line);border-radius:10px;margin-bottom:6px;box-shadow:var(--shadow)}
  .rankrow.gross{background:#fbf3e0;border-color:#e9d6a8}
  .rankrow.me{border-color:var(--fairway-2);box-shadow:0 0 0 2px rgba(45,106,79,.14)}
  .rankhead .rl,.rankrow .rl{flex:0 0 58px;white-space:nowrap;overflow:hidden}
  .rankhead .rn,.rankrow .rn{flex:1;min-width:0}
  .rankhead .rc,.rankrow .rc{flex:0 0 38px;text-align:right}
  .rankhead .rc2,.rankrow .rc2{flex:0 0 46px;text-align:right}
  .rankrow .rc2.up{color:var(--flag);font-weight:700}
  .ssgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .ssrow{display:flex;align-items:center;gap:7px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--paper-2);font-size:14px;min-width:0}
  .ssrow.gross{background:#fbf3e0;border-color:#e9d6a8}
  .ssrow.me{border-color:var(--fairway-2);box-shadow:0 0 0 2px rgba(45,106,79,.12)}
  .ssrow .sr{flex:0 0 18px;color:var(--ink-soft);font-size:13px;text-align:right}
  .ssrow .snm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ssrow .sg{flex:0 0 auto;font-family:Georgia,serif;font-weight:700;color:var(--fairway)}
  #seasonMBody{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .guestbox{background:#fbf2e9;border:1px solid #ecd9c4;border-radius:12px;margin-top:10px;padding:2px 12px 12px}
  .editbox{border:1px solid var(--line);border-radius:11px;background:var(--paper-2);padding:0 12px;margin-bottom:4px}
  .lockbar{display:flex;align-items:center;gap:8px;margin:10px 0 2px;padding:9px 12px;border-radius:10px;background:#eef4ee;border:1px solid #d6e3d8;font-size:13.5px}
  .mxtab{border-collapse:separate;border-spacing:0;font-size:12.5px;white-space:nowrap}
  .mxtab th,.mxtab td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:4px 8px;text-align:center;background:var(--paper)}
  .mxtab thead th{position:sticky;top:0;z-index:2;background:#eef4ee;border-bottom:2px solid #cdddd0}
  .mxtab th small{display:block;font-size:10.5px;color:var(--ink-soft);font-weight:400;margin-top:1px}
  .mxtab .mx-no{position:sticky;left:0;z-index:3;width:30px;color:var(--ink-soft)}
  .mxtab .mx-nm{position:sticky;left:30px;z-index:3;text-align:left;min-width:80px;font-weight:600;border-right:2px solid #cdddd0}
  .mxtab thead .mx-no,.mxtab thead .mx-nm{z-index:4}
  .mxtab .mx-nm i{font-style:normal;color:var(--fairway);font-size:11px;margin-right:3px}
  .mxtab td.mxchamp{background:#fff1b8;font-weight:700;color:#9a6a00}
  .mxtab .mx-pl{background:#eef4ee;font-weight:600;border-left:2px solid #cdddd0}
  .lockbar.on{background:#f6ece3;border-color:#e7d2bd}
  .lockbar .lk{flex:1;font-weight:600;color:var(--ink)}
  .lockbar .btn{width:auto;flex:0 0 auto;padding:7px 12px;font-size:13px}
  .editbox>summary{cursor:pointer;list-style:none;padding:12px 0;font-size:15.5px;font-weight:600;color:var(--ink);display:flex;align-items:center}
  .editbox .reg-ok{color:var(--fairway);font-weight:700}
  .editbox>summary::-webkit-details-marker{display:none}
  .editbox>summary::after{content:"修改 ▾";margin-left:auto;font-size:13px;color:var(--fairway);font-weight:700;white-space:nowrap;padding-left:8px}
  .editbox[open]>summary::after{content:"收合 ▴"}
  .editbox[open]>summary{border-bottom:1px solid var(--line);margin-bottom:8px}
  .editbox>:last-child{margin-bottom:12px}
  .guestbox>summary{cursor:pointer;list-style:none;font-size:15px;font-weight:600;color:#9a6a3a;padding:11px 2px}
  .guestbox>summary::-webkit-details-marker{display:none}
  .guestbox>summary::after{content:"▾";float:right;color:#b98a5a;font-weight:400}
  .guestbox[open]>summary::after{content:"▴"}
  .guestbox .field label{color:#8a6038}
  .seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg .segb{flex:1;padding:11px 8px;background:var(--paper-2);border:none;border-right:1px solid var(--line);font-size:16px;font-weight:600;color:var(--ink-soft);font-family:inherit;cursor:pointer}
  .seg .segb:last-child{border-right:none}
  .seg .segb.on{background:var(--fairway);color:#fff}
  .atttext{width:100%;flex:1;min-height:240px;box-sizing:border-box;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:15px;line-height:1.7;font-family:inherit;color:var(--ink);background:var(--paper-2);resize:none}
  .champrow{display:flex;align-items:center;gap:8px;padding:11px 8px;border-top:1px solid var(--line);cursor:pointer}
  .champrow:first-child{border-top:none}
  .champrow .cr-date{flex:0 0 52px;font-weight:700;color:var(--fairway)}
  .champrow .cr-champ{flex:1;min-width:0;font-size:15px}
  .champrow .cr-champ small{color:var(--ink-soft)}
  .champrow .cr-go{flex:0 0 auto;font-size:14px;color:var(--flag);font-weight:700}
  .champrow:active{background:var(--green-soft)}
  .scorebox{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:8px 10px;margin-bottom:12px;box-shadow:var(--shadow)}
  .scorebox .boxtitle{font-size:13px;font-weight:700;color:var(--fairway);letter-spacing:.04em;margin:2px 2px 7px}
  .scorebox .rankhead{padding:0 8px 6px}
  .scorebox .rankrow{box-shadow:none;background:transparent;border:none;border-radius:0;border-top:1px solid var(--line);margin:0;padding:8px}
  .scorebox .rankrow.me{background:var(--green-soft)}
  .scorebox .rankrow.gross{background:#fbf3e0}
  .techrow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:8px;border-top:1px solid var(--line)}
  .techrow:first-of-type{border-top:none}
  .techrow .ta{font-size:14px;color:var(--ink-soft);flex:0 0 auto}
  .techrow .ta em{font-style:normal;font-size:13px;color:var(--flag);margin-left:4px}
  .techrow .tw{font-weight:600;font-size:16px;text-align:right;min-width:0}
  .hcpinfo{margin:2px 0 12px}
  .hcpinfo>summary{cursor:pointer;padding:8px 2px;font-size:14px;font-weight:700;color:var(--fairway);list-style:none}
  .hcpinfo>summary::-webkit-details-marker{display:none}
  .hcpinfo>summary::after{content:"▾";float:right;color:var(--ink-soft);font-weight:400}
  .hcpinfo[open]>summary::after{content:"▴"}
  .hcpinfo-body{padding:0 2px 8px;font-size:14px;color:var(--ink);line-height:1.6}
  .hcpinfo-body p{margin:6px 0}
  .hcpinfo-body .hi-h{font-weight:700;color:var(--fairway);margin-top:10px}
  .hcpinfo-body .hi-n{color:var(--ink-soft);font-size:13px;background:var(--paper-2);border-radius:8px;padding:6px 9px}
  .hi-t{width:100%;border-collapse:collapse;margin:4px 0}
  .hi-t th,.hi-t td{border:1px solid var(--line);padding:4px 6px;text-align:center;font-size:13px}
  .hi-t th{background:var(--paper-2);color:var(--ink-soft)}
  .rankrow .rl{font-weight:700;color:var(--fairway)}
  .rankrow.gross .rl{color:var(--gold)}
  .rankrow .rn i{font-size:12px;color:var(--fairway-2);font-style:normal}
  .ranknote{font-size:13px;color:var(--ink-soft);margin-top:6px}
  .feesum{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;font-size:14px;color:var(--ink-soft)}
  .feesum b{color:var(--fairway);font-family:Georgia,serif;font-size:16px}
  .feerow{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;background:var(--paper-2);cursor:pointer}
  .feerow.ro{cursor:default}
  .feerow.paid{background:var(--green-soft);border-color:#cfe0d2}
  .feerow .fn{flex:1;font-size:15.5px;font-weight:600}
  .feerow .fn small{color:var(--ink-soft);font-weight:400}
  .feerow .fa{font-size:14px;color:var(--ink-soft)}
  .feerow .fc{flex:0 0 auto;font-size:13.5px;font-weight:700;color:#9aa79b;min-width:48px;text-align:right}
  .feerow.paid .fc{color:var(--fairway)}
  .sch{display:flex;align-items:center;flex-wrap:wrap;gap:5px 9px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;margin-bottom:7px;background:var(--paper-2);box-shadow:var(--shadow)}
  .sch.next{border-color:var(--fairway-2);box-shadow:0 0 0 2px rgba(45,106,79,.14)}
  .sch.past{opacity:.5}
  .sch .s-date{font-size:17.5px;font-family:Georgia,serif;color:var(--fairway);font-weight:700}
  .sch .s-dow{font-size:14px;color:var(--ink-soft)}
  .sch .typ{font-size:13px;font-weight:700;color:var(--fairway-2);background:var(--green-soft);padding:2px 7px;border-radius:5px}
  .sch .typ.alt{color:var(--flag);background:#fbeeec}
  .sch .s-course{font-size:16px;font-weight:600}
  .sch .s-tee{font-size:15px;color:var(--ink)}
  .sch .s-x{font-size:14px;color:var(--ink-soft)}
  .schb{margin-left:auto;flex:0 0 auto;font-size:13px;font-weight:700;padding:3px 9px;border-radius:20px;background:#efe6d4;color:var(--gold)}
  .schb.on{background:var(--fairway);color:#fff}
  .locked{display:flex;align-items:center;gap:12px;padding:16px;border:1px dashed var(--line);border-radius:12px;background:var(--paper-2);color:var(--ink-soft)}
  .locked .lk{font-size:24px}
  .locked b{display:block;font-size:15px;color:var(--ink)}
  .locked small{font-size:13px;color:var(--ink-soft)}
  .gm{color:#2563eb}
  .gf{color:#d6336c}
  .bindrow{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:1px solid var(--line);border-radius:9px;margin-bottom:5px;background:var(--paper-2)}
  .bindrow.on{background:var(--green-soft);border-color:#cfe0d2}
  .bindrow .bn{font-size:15px;font-weight:600}
  .bindrow .bn small{color:var(--ink-soft);font-weight:400}
  .bindrow .bs{font-size:13px;font-weight:700;color:#c98a2b}
  .bindrow.on .bs{color:var(--fairway)}
  .offs{display:flex;flex-direction:column;gap:8px}
  .offrow{display:flex;align-items:center;gap:12px}
  .offrow .ot{flex:0 0 64px;font-size:13px;font-weight:700;color:#fff;background:var(--fairway);padding:3px 0;border-radius:6px;text-align:center}
  .offrow .on{font-size:16px;font-weight:600}
  .mystat{display:flex;gap:8px}

  .sctab .sc-tot{font-family:Georgia,serif;font-weight:700;color:var(--fairway);min-width:38px}

  /* 成績輸入:滿版 + 內容可捲動 + 送出鍵固定底部 */
  .modal-card.full{max-width:560px;width:100%;height:100dvh;height:100%;max-height:none;border-radius:0;padding:12px 14px 0}

  .pvbar{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#14532d;color:#eaf3ec;border-radius:10px;padding:8px 12px;margin-bottom:12px;font-size:14px}

  .rchip.me{background:var(--green-soft);border-color:#cfe0d2}
  .rchip.wait{opacity:.7}
  .rchip .rnum{flex:0 0 auto;font-size:12px;color:var(--ink-soft);min-width:16px;text-align:center}
  .rchip .rnm{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rchip .ct{flex:0 0 auto;font-size:11px;font-style:normal;color:#fff;background:#9aa0a6;border-radius:5px;padding:1px 4px}
  .rchip .ct.me{background:var(--fairway)}
  .rchip .ct.wait{background:#c98a2b}
  .rchip .ct.note{background:#7a86c2}
  .rchip .ct.guest{background:#0c8a8a}
  .rchip .gg{margin-left:auto;font-family:Georgia,serif;font-size:17.5px;color:var(--fairway)}

  .rchip.leave{background:#faf1ee;border-color:#e7cfc8}
  .rchip .ct.leave{background:var(--flag)}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="center"><div class="spinner"></div>連線中…</div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   設定區 — 部署時把這兩個值換成你自己的
   ============================================================ */
var LIFF_ID = "2010396373-bdFy7e3d";
var GAS_URL = "https://script.google.com/macros/s/AKfycbwwU9v8uVEIhg8hgBtU053D5sMIXW-9cFJBYl48K7Cps9_p6IQ89SQrH91-jMuBPpQa/exec";
/* ============================================================ */

var app = document.getElementById("app");
var profile = null;     // {userId, displayName, pictureUrl}
var ID_TOKEN = '';      // LINE ID Token(寫入動作驗證用)
var state = null;       // bootstrap 回傳

// ---- JSONP:用 <script> 載入,避開 CORS ----
function api(params){
  return new Promise(function(resolve, reject){
    var cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*1e6);
    var timer = setTimeout(function(){ cleanup(); resolve({ok:false, error:"連線逾時,請確認網路後再試一次"}); }, 20000);
    window[cb] = function(data){ clearTimeout(timer); cleanup(); resolve(data); };
    function cleanup(){ delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); }
    var qs = Object.keys(params).map(function(k){
      return encodeURIComponent(k)+"="+encodeURIComponent(params[k]);
    }).join("&");
    if(ID_TOKEN) qs += "&idToken=" + encodeURIComponent(ID_TOKEN);
    var s = document.createElement("script");
    s.src = GAS_URL + "?" + qs + "&callback=" + cb;
    s.onerror = function(){ clearTimeout(timer); cleanup(); resolve({ok:false, error:"無法連線到伺服器,請稍後再試"}); };
    document.body.appendChild(s);
  });
}

function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function capNum(){var n=parseInt((state.eventView&&state.eventView.cap)||state.event.cap,10);return isNaN(n)?0:n;}
function myRow(){return state.roster.filter(function(p){return p.userId===profile.userId;})[0]||null;}

// ---- 啟動 ----
var previewMember=false;
(async function init(){
  // ① 提早暖機:用上次存的 userId,在 liff.init「之前」就平行送出 bootstrap。
  //    重複登入時,GAS 冷啟動會與 LIFF 初始化同時進行,不必先等 LIFF 再等資料。
  var cachedUid=""; try{ cachedUid=localStorage.getItem("liff_uid")||""; }catch(e){}
  var pWarm = cachedUid ? api({ action:"bootstrap", userId:cachedUid, asMember:"" }) : null;

  try{
    await liff.init({ liffId: LIFF_ID });
  }catch(e){
    return fatal("LIFF 初始化失敗,請確認 LIFF_ID 設定正確。");
  }
  if(!liff.isLoggedIn()){ liff.login(); return; }   // 外部瀏覽器會導向 LINE 登入

  try{ ID_TOKEN = liff.getIDToken() || ""; }catch(e){ ID_TOKEN = ""; }   // 寫入動作驗證用(需頻道開啟 openid scope)

  var ctx=null; try{ ctx=liff.getContext(); }catch(e){}
  var uid = ctx && ctx.userId;
  // ② 首次或未命中暖機時,用 getContext 的 uid 盡早起跑 bootstrap(與「取個人資料」平行)
  var pBootCtx = (!pWarm && uid) ? api({ action:"bootstrap", userId:uid, asMember: previewMember?"1":"" }) : null;

  var pProfile = liff.getProfile().catch(function(){ return null; });
  profile = await pProfile;
  if(!profile){
    if(uid){ profile = { userId:uid, displayName:"", pictureUrl:"" }; }   // 拿不到 profile 但有 uid,仍可運作
    else { return fatal("無法取得 LINE 個人資料,請重新開啟。"); }
  }
  try{ localStorage.setItem("liff_uid", profile.userId); }catch(e){}   // 存起來,下次提早暖機用

  try{
    // ③ 挑選正確使用者的那一趟 bootstrap:優先重用已平行跑的暖機/起跑趟,否則現在才抓
    var pBoot;
    if(pWarm && cachedUid === profile.userId)        pBoot = pWarm;       // 重用暖機那趟(最快)
    else if(pBootCtx && uid === profile.userId)       pBoot = pBootCtx;    // 重用 getContext 起跑那趟
    else  pBoot = api({ action:"bootstrap", userId: profile.userId, asMember: previewMember?"1":"" });
    state = await pBoot;
    if(!state || !state.ok) return fatal((state&&state.error) || "讀取失敗");
    render();
    loadMyStats();
  }catch(e){
    fatal(e.message || "連線失敗,請確認 GAS_URL 設定並稍後再試。");
  }
})();

async function reload(){
  try{
    var hadAdmin = state && state.__adminLoaded;
    var pBoot = api({ action:"bootstrap", userId: profile.userId, asMember: previewMember?"1":"" });
    var pAdmin = hadAdmin ? api({ action:"adminData", userId: profile.userId, asMember: previewMember?"1":"" }) : null;
    var s = await pBoot;
    if(!s.ok) return fatal(s.error || "讀取失敗");
    if(pAdmin){
      var ad = await pAdmin;
      if(ad && ad.ok){ s.hcpList=ad.hcpList; s.memberFees=ad.memberFees; s.binding=ad.binding; s.balls=ad.balls; s.techList=ad.techList; s.seasonResetAllowed=ad.seasonResetAllowed; s.seasonResetLastMatch=ad.seasonResetLastMatch; s.teamNote=ad.teamNote; s.__adminLoaded=true; }
    }
    var prevMyStats = (state && state.myStats !== undefined) ? state.myStats : undefined;
    state = s;
    if(prevMyStats !== undefined) state.myStats = prevMyStats;   // 沿用上次,重新整理時不閃爍
    render();
    loadMyStats();           // 首屏畫好後再補抓「我的本年度」統計(不拖慢登入)
  }catch(e){
    fatal(e.message || "連線失敗,請確認 GAS_URL 設定並稍後再試。");
  }
}

// 首屏後補抓/刷新「我的本年度出席/獎金」(原本在 bootstrap,改延後以加快登入)
function loadMyStats(){
  if(!state || !state.member || state.__myStatsLoading) return;
  state.__myStatsLoading=true;
  api({ action:"myStats", userId: profile.userId }).then(function(r){
    state.__myStatsLoading=false;
    if(r && r.ok){ state.myStats=r.myStats; rerenderKeepOpen(); }
  });
}

// 展開管理員專區 → 抓一次管理員資料,抓到後就地重繪(保留已展開的區塊)
function loadAdminData(){
  if(!state || state.__adminLoaded || state.__adminLoading) return;
  state.__adminLoading=true;
  api({ action:"adminData", userId: profile.userId, asMember: previewMember?"1":"" }).then(function(r){
    state.__adminLoading=false;
    if(r && r.ok){
      state.hcpList=r.hcpList; state.memberFees=r.memberFees; state.binding=r.binding; state.balls=r.balls; state.techList=r.techList;
      state.seasonResetAllowed=r.seasonResetAllowed; state.seasonResetLastMatch=r.seasonResetLastMatch; state.teamNote=r.teamNote;
      state.__adminLoaded=true;
      rerenderKeepOpen();
    }
  });
}
// 重繪主畫面但保留目前展開的管理員區塊
function rerenderKeepOpen(){
  var openTexts=[];
  document.querySelectorAll(".admsec[open]>summary").forEach(function(s){ openTexts.push(s.textContent); });
  renderMain();
  document.querySelectorAll(".admsec").forEach(function(d){
    var s=d.querySelector("summary");
    if(s && openTexts.indexOf(s.textContent)>=0) d.open=true;
  });
}

function fatal(msg){
  app.innerHTML = '<div class="err">⚠️ '+esc(msg)+'</div>'+
                  '<div class="center"><button class="btn sm" onclick="location.reload()">重新載入</button></div>';
}

// ---- 畫面 ----
function render(){
  if(!state.member){ return renderSetup(); }   // 還沒綁定全名
  renderMain();
}

// 第一次:設定全名(預設帶入 LINE 暱稱,可改成正式姓名)
function renderSetup(){
  app.innerHTML =
  '<div class="card"><div class="masthead">'+
    flagSvg()+
    '<p class="eyebrow">First time · 初次設定</p>'+
    '<h1 class="title">Welcome</h1>'+
    '<p class="title-zh">設定一次,以後一鍵登記</p>'+
  '</div></div>'+
  '<div class="youbar" style="margin-top:16px">'+ avatar() +
    '<div class="who"><b>'+esc(profile.displayName)+'</b><small>你的 LINE 帳號</small></div>'+
  '</div>'+
  '<div class="section-label">初次設定 · 建立個人資料</div>'+
  '<div class="panel">'+
    '<div class="field"><label>LINE 名稱</label>'+
    '<input type="text" value="'+esc(profile.displayName)+'" disabled style="opacity:.65;background:#efece3"></div>'+
    '<div class="field"><label>姓名 (中文全名)</label>'+
    '<input id="nm" type="text" maxlength="20" placeholder="請填你的本名"></div>'+
    '<div class="field"><label>聯絡電話(必填,建立個人資料用)</label><input id="phone" type="tel" inputmode="numeric" maxlength="20" placeholder="如 0912345678"></div>'+
    '<div class="field"><label>性別 (會員可不填;來賓請選)</label><select id="gender"><option value="">請選擇</option><option value="男">男</option><option value="女">女</option></select></div>'+
    '<div class="field"><label>出生年(西元,必填,排名平手比序用)</label><input id="birth" type="text" inputmode="numeric" maxlength="4" placeholder="如 1965"></div>'+
    '<button class="btn" id="saveName">確認,開始登記</button>'+
  '</div>';
  document.getElementById("saveName").onclick = onSaveName;
}

function renderMain(){
  var c=capNum();
  var playing=state.roster.filter(function(r){return r.status!=="請假";});
  var leave=state.roster.filter(function(r){return r.status==="請假";});
  var total=playing.length;
  var confirmed=c>0?Math.min(total,c):total, waiting=c>0?Math.max(0,total-c):0;
  var left=c>0?Math.max(0,c-total):null, isFull=c>0&&total>=c;
  var mine=myRow();
  var iAmLeave=!!(mine&&mine.status==="請假");
  var iAmPlaying=!!(mine&&mine.status!=="請假");
  var myIdx=playing.indexOf(mine);
  var iAmWaiting=iAmPlaying&&c>0&&myIdx>=c;

  app.innerHTML =
  previewBar()+
  (state.notices&&state.notices.announce ? '<div class="notice announce"><div class="nttl">📣 最新消息</div><div class="nbody">'+noticeHtml(state.notices.announce)+'</div></div>' : '')+
  '<div class="card">'+
    '<div class="masthead">'+flagSvg()+
      '<p class="eyebrow">'+teamLine()+'</p>'+
      '<h1 class="title">'+esc(state.event.title)+'</h1>'+
      '<p class="title-zh">'+esc(state.event.titleZh)+'</p>'+
    '</div>'+
    '<div class="meta">'+
      metaRow("日期",ev().date)+ metaRow("球場",ev().course)+
      metaRow("開球",ev().tee,"tee")+ metaRow("費用",ev().fee,"fee")+
      metaRow("截止",ev().deadline)+ metaRow("名額",ev().cap)+
    '</div>'+
  '</div>'+

  '<div class="countstrip">'+
    '<div class="cstat"><b>'+confirmed+'</b><span>參加</span></div>'+
    '<div class="cstat"><b>'+leave.length+'</b><span>請假</span></div>'+
    (state.progress&&state.progress.members?'<div class="cstat"><b>'+state.progress.notYet+'</b><span>尚未登記</span></div>':'')+
  '</div>'+

  '<div class="youbar">'+ avatar() +
    '<div class="who"><b>'+gname(state.member.name)+'</b><small>｜'+identitySmall()+'｜差點 '+esc((state.myHcp&&state.myHcp!=="")?state.myHcp:"—")+'</small></div>'+
    '<span class="badge '+(iAmLeave?"leave":(iAmPlaying?"in":"out"))+'">'+(iAmLeave?"請假":(iAmPlaying?(iAmWaiting?"候補":"本場已登記參加"):"尚未登記"))+'</span>'+
  '</div>'+

  (iAmLeave ? leavePanel() : (iAmPlaying ? registeredPanel(mine) : registerPanel(isFull)))+
  (state.isAdmin ?
    '<button class="btn sm" id="shareMenu" style="width:100%;margin-top:8px">📤 分享到群組</button>'+
    '<div id="shareChoose" style="display:none;gap:8px;margin-top:6px">'+
      '<button class="btn ghost sm" id="shareCard" style="flex:1">🏌️ 例賽卡</button>'+
      '<button class="btn ghost sm" id="shareRoster" style="flex:1">📋 報名狀況</button>'+
    '</div>'
  : '')+

  (state.notices&&state.notices.event ? '<div class="notice event"><div class="nttl">📌 本場注意</div><div class="nbody">'+noticeHtml(state.notices.event)+'</div></div>' : '')+

  '<div class="section-label">出席名單 · '+total+' 人</div>'+
  (total===0
      ? '<div class="empty">還沒有人登記,當第一個開球的人吧 ⛳</div>'
      : '<div class="rgrid">'+playing.map(function(p,i){return playerChip(p,i,c);}).join("")+'</div>')+
  (leave.length? '<div class="section-label">請假名單 · '+leave.length+' 人</div><div class="rgrid">'+
      leave.map(function(p){return '<div class="rchip leave"><span class="rnm">'+gname(p.name)+'</span><i class="ct leave">請假</i></div>';}).join("")+'</div>' : '')+
  (state.isAdmin && total>0 ? '<button class="btn ghost sm" id="openAttList" style="width:100%;margin-top:4px">📋 匯出出席名單(傳球場)</button>'+attListModalHtml(playing) : '')+

  groupsSection()+
  (state.isAdmin ? groupAdminPanel() : "")+
  (state.isAdmin ? matchScoreAdminPanel() : "")+
  rankingSection()+
  guestSection()+
  seasonSection()+
  scheduleSection()+
  myStatsSection()+
  myFeeSection()+
  officersSection()+

  (state.isAdmin ? adminPanel() : "")+

  '<div class="footer">'+
    (!state.hasAdmin ? '<button id="claim">設我為管理員</button>' : '')+
    '<button id="reloadBtn">重新整理</button>'+
  '</div>';

  wireMain(isFull, iAmPlaying, iAmLeave);
}

function registerPanel(isFull){
  return '<div class="section-label">'+(isFull?"加入候補":"出席登記")+'</div>'+
  '<div class="panel">'+

// 複製文字(LINE 內建瀏覽器相容:優先 clipboard API,失敗退回 execCommand)
function copyText(t){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(function(){toast("✓ 已複製");},function(){fallbackCopy(t);});
  } else fallbackCopy(t);
}
function fallbackCopy(t){
  var ta=document.createElement("textarea"); ta.value=t;
  ta.style.position="fixed"; ta.style.top="0"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand("copy"); toast("✓ 已複製"); }catch(e){ toast("複製失敗,請長按選取"); }
  document.body.removeChild(ta);
}

function techRowFilled(award,winner,tiao){
  var ao=TECH_OPTS.map(function(a){return '<option'+(a===award?' selected':'')+'>'+a+'</option>';}).join('');
  var isGuest=(award==="來賓獎");
  var names=isGuest?scoredGuestList():scoredNameList();
  if(winner && names.indexOf(winner)<0) names=names.concat([winner]);
  return '<div class="techrow"><select class="tr-award">'+ao+'</select>'+
         '<select class="tr-name">'+optionsHtml(names,winner)+'</select>'+
         '<input class="tr-tiao" value="'+esc(String(tiao||1))+'" inputmode="numeric"></div>';

function openEditScores(){
  var m=document.getElementById("scoreModal");

  if(state.matchLocked){ toast("本場已鎖定,請先在月例賽成績區「🔓 解鎖」再修改"); return; }
  var di=document.getElementById("smDate"); if(di) di.value=state.ranking.date;
  var byName={}; (state.ranking.results||[]).forEach(function(r){ byName[r.name]=r; });
  document.querySelectorAll("#smBody tr[data-name]").forEach(function(tr){
    var r=byName[tr.getAttribute("data-name")];
    var oin=tr.querySelector(".sc-out"), iin=tr.querySelector(".sc-in");
    oin.value=(r&&r.out!=null&&r.out!=="")?r.out:"";
    iin.value=(r&&r.in!=null&&r.in!=="")?r.in:"";
    oin.dispatchEvent(new Event("input",{bubbles:true}));   // 重算總桿/淨桿 + 更新得獎者名單

// 當場已輸入成績(OUT+IN 都有)的會員 / 來賓
function scoredList(guest){
  var out=[];
  document.querySelectorAll("#smBody tr[data-name]").forEach(function(tr){
    var o=(tr.querySelector(".sc-out").value||"").trim();
    var i=(tr.querySelector(".sc-in").value||"").trim();
    if(o===""||i==="") return;
    var isGuest=tr.getAttribute("data-role")==="來賓";
    if(!!guest===isGuest) out.push(tr.getAttribute("data-name"));
  });
  return out;
}
function scoredNameList(){ return scoredList(false); }   // 會員
function scoredGuestList(){ return scoredList(true); }    // 來賓
function optionsHtml(names,selected){
  return '<option value="">選人</option>'+names.map(function(n){
    return '<option'+(n===selected?' selected':'')+'>'+esc(n)+'</option>';
  }).join('');
}
function techNameOptions(selected){ return optionsHtml(scoredNameList(),selected); }
function guestNameOptions(selected){ return optionsHtml(scoredGuestList(),selected); }
// 成績變動時:重建各列得獎者下拉(會員列=會員、來賓獎列=來賓),並自動同步來賓獎列
function refreshTech(){
  document.querySelectorAll("#smTechRows .techrow").forEach(function(row){
    var aw=row.querySelector(".tr-award"), nm=row.querySelector(".tr-name");
    if(!aw||!nm) return;
    var cur=nm.value;
    nm.innerHTML=(aw.value==="來賓獎")?guestNameOptions(cur):techNameOptions(cur);
  });
  syncGuestAwards();
}
// 有來賓且有成績 → 自動帶一列「來賓獎」並填入來賓名;來賓無成績則移除其自動列
function syncGuestAwards(){
  var guests=scoredGuestList();
  var box=document.getElementById("smTechRows"); if(!box) return;
  var have={};
  Array.prototype.slice.call(box.querySelectorAll('.techrow[data-auto-guest]')).forEach(function(row){
    var g=row.getAttribute('data-auto-guest');
    if(guests.indexOf(g)<0) row.parentNode.removeChild(row); else have[g]=true;
  });
  guests.forEach(function(g){
    if(have[g]) return;
    var div=document.createElement("div");
    div.className="techrow"; div.setAttribute('data-auto-guest', g);
    div.innerHTML=techRowInnerGuest(g);
    box.appendChild(div);
  });
}

  return html;
}

  L.push("");
  L.push("出席名單(共 "+playing.length+" 人):");
  L.push("用餐 "+dine+" 人 · 不用餐 "+noDine+" 人");
  playing.forEach(function(p,i){
    var isGuest=(p.userId && p.userId.indexOf("G:")===0) || (state.roleMap && state.roleMap[p.name]==="來賓");
    var isProxy=(p.userId && p.userId.indexOf("M:")===0);
    L.push((i+1)+". "+p.name+(isGuest?"(來賓)":(isProxy?"(代)":"")));

  var sec=(e.secretary||'').trim();
  L.push("");
  L.push("承辦:總幹事 "+(sec||'張凌華')+" 0905361633");
  return L.join("\n");

function scheduleSection(){
  var s=state.schedule;
  if(!s || !s.length) return "";
  var todayKey=state.todayKey||(function(){var d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();})();
  var ny=Math.floor(todayKey/10000), nm=Math.floor(todayKey/100)%100, nowIdx=ny*12+(nm-1);
  var up=s.filter(function(e){
    if(e.sortKey<todayKey) return false;
    var ey=parseInt(e.year,10)||ny, em=parseInt(e.month,10)||nm;
    return (ey*12+(em-1)) <= nowIdx+2;          // 本月起未來兩個月內
  });
  var nextSort=up.length?up[0].sortKey:-1;
  var html='<div class="section-label">近期賽程</div>';
  html+= up.length
    ? up.map(function(e){return schItem(e, e.sortKey===nextSort, false);}).join('')
    : '<div class="empty">近期暫無例賽。</div>';
  html+='<button class="btn ghost sm" id="openSched" style="margin-top:8px;width:100%">看整年度賽程</button>';
  html+= scheduleModalHtml();
  if(state.isAdmin) html+='<div class="ranknote">編輯/新增/刪除請到試算表「行事曆」分頁;預約提醒會自動更新。</div>';
  return html;
}
function scheduleModalHtml(){
  var s=state.schedule||[], todayKey=state.todayKey||0;
  var nextSort=-1; for(var i=0;i<s.length;i++){ if(s[i].sortKey>=todayKey){ nextSort=s[i].sortKey; break; } }
  var rows=s.map(function(e){return schItem(e, e.sortKey===nextSort, e.sortKey<todayKey);}).join('');
  return '<div id="schedModal" class="modal hidden"><div class="modal-card full">'+
    '<div class="modal-head"><span>整年度賽程'+(seasonLabel()?' '+esc(seasonLabel()):'')+'</span><button class="mclose" id="schedClose">✕</button></div>'+
    '<div class="sctab-wrap" style="padding:4px">'+rows+'</div>'+
  '</div></div>';
}

  var ih=document.getElementById("importHcp");

    var txt=val("impHcp").trim();
    if(!txt){ toast("請先貼上名單"); return; }
    busy("importHcp","匯入中…");
    api({action:"importHcp",userId:profile.userId,text:txt}).then(function(r){
      toast(r.ok?("已匯入 "+r.imported+" 筆差點"):(r.error||"匯入失敗")); reload();
    });
  };
  var seedT=document.getElementById("seedTest");
  if(seedT) seedT.onclick=function(){
    if(!confirm("建立一批【測】開頭的測試會員與出席資料?")) return;
    busy("seedTest","建立中…");
    api({action:"seedTestData",userId:profile.userId}).then(function(r){
      toast(r.ok?("已建立 "+r.seeded+" 筆測試資料"):(r.error||"失敗")); reload();
    });
  };
  var clearT=document.getElementById("clearTest");
  if(clearT) clearT.onclick=function(){
    if(!confirm("清除所有【測】開頭的測試資料(名單/出席/成績/技術獎等)?此動作不影響正式資料。")) return;
    busy("clearTest","清除中…");
    api({action:"clearTestData",userId:profile.userId}).then(function(r){
      toast(r.ok?("已清除 "+r.removed+" 筆測試資料"):(r.error||"失敗")); reload();
    });
  };
  var fc=document.getElementById("flushCache");
  if(fc) fc.onclick=function(){
    busy("flushCache","清除中…");
    api({action:"flushCache",userId:profile.userId}).then(function(r){
      var e0=document.getElementById("flushCache"); if(e0){e0.disabled=false;e0.textContent="🔄 清除快取(改完試算表後按)";}
      if(!r.ok){ toast(r.error||"清除失敗"); return; }
      toast("✓ 已清除快取,正在讀取最新資料…"); reload();
    });
  };
  var openScore=document.getElementById("openScore");
  if(openScore) openScore.onclick=function(){ var m=document.getElementById("scoreModal"); if(m) m.classList.remove("hidden"); };
  var openMatrix=document.getElementById("openMatrix");
  if(openMatrix) openMatrix.onclick=function(){
    var md=document.getElementById("matrixModal"); if(!md) return;
    md.classList.remove("hidden");
    var b=document.getElementById("matrixBody");
    if(state.__matrix){ if(b) b.innerHTML=matrixTableHtml(state.__matrix); return; }
    if(b) b.innerHTML='<p class="formnote">載入中…</p>';
    api({action:"scoreMatrix",userId:profile.userId}).then(function(r){
      var bb=document.getElementById("matrixBody"); if(!bb) return;
      if(r&&r.ok){ state.__matrix=r.matrix; bb.innerHTML=matrixTableHtml(r.matrix); }
      else bb.innerHTML='<p class="formnote">載入失敗,請重試。</p>';
    });
  };
  var matrixClose=document.getElementById("matrixClose");
  if(matrixClose) matrixClose.onclick=function(){ var md=document.getElementById("matrixModal"); if(md) md.classList.add("hidden"); };
  var buildMatrix=document.getElementById("buildMatrix");
  if(buildMatrix) buildMatrix.onclick=function(){
    busy("buildMatrix","產生中…");
    api({action:"buildSeasonMatrix",userId:profile.userId}).then(function(r){
      toast(r.ok?("✓ 已寫入「成績總表」分頁("+r.members+" 人 × "+r.months+" 場)"):(r.error||"產生失敗"));
      var b=document.getElementById("buildMatrix"); if(b){b.disabled=false;b.textContent="產生成績總表 · 會員×每月(寫入分頁)";}
    });
  };
  var editScore=document.getElementById("editScore");
  if(editScore) editScore.onclick=openEditScores;
  var editScore2=document.getElementById("editScore2");
  if(editScore2) editScore2.onclick=openEditScores;
  var scoreClose=document.getElementById("scoreClose");
  if(scoreClose) scoreClose.onclick=function(){ var m=document.getElementById("scoreModal"); if(m) m.classList.add("hidden"); };
  var smBody=document.getElementById("smBody");
  if(smBody) smBody.addEventListener("input",function(ev){
    var t=ev.target; if(!t.classList.contains("sc-out")&&!t.classList.contains("sc-in")) return;
    var tr=t.closest("tr"); if(!tr) return;
    var o=parseInt(tr.querySelector(".sc-out").value,10);
    var i=parseInt(tr.querySelector(".sc-in").value,10);
    var hc=parseFloat(tr.getAttribute("data-hcp"));
    var ok=(!isNaN(o)&&!isNaN(i)), tot=ok?o+i:null;
    tr.querySelector(".sc-tot").textContent=ok?String(tot):"—";
    tr.querySelector(".sc-net").textContent=(ok&&!isNaN(hc))?String(tot-hc):(ok?String(tot):"—");
    refreshTech();
  });
  var smAddTech=document.getElementById("smAddTech");
  if(smAddTech) smAddTech.onclick=function(){
    var div=document.createElement("div"); div.className="techrow";
    div.innerHTML=techRowInner("BIRDIE獎");
    document.getElementById("smTechRows").appendChild(div);
  };
  var smTechRows=document.getElementById("smTechRows");
  if(smTechRows) smTechRows.addEventListener("change",function(ev){
    if(!ev.target.classList.contains("tr-award")) return;
    var row=ev.target.closest(".techrow"); if(!row) return;
    var nm=row.querySelector(".tr-name"); var cur=nm.value;
    nm.innerHTML=(ev.target.value==="來賓獎")?guestNameOptions(cur):techNameOptions(cur);
  });
  var lockBtn=document.getElementById("lockBtn");
  if(lockBtn) lockBtn.onclick=function(){
    if(!confirm("鎖定後「"+state.matchLockDate+"」的成績將不可再編輯(需解鎖才能改)。確定鎖定?")) return;
    busy("lockBtn","鎖定中…");
    api({action:"lockScores",userId:profile.userId,date:state.matchLockDate}).then(function(r){
      if(r&&r.ok){ toast("✓ 已鎖定本場成績"); reload(); }
      else { toast((r&&r.error)||"鎖定失敗"); var b=document.getElementById("lockBtn"); if(b){b.disabled=false;b.textContent="🔒 鎖定本場";} }
    });
  };
  var unlockBtn=document.getElementById("unlockBtn");
  if(unlockBtn) unlockBtn.onclick=function(){
    if(!confirm("解鎖後即可再次編輯「"+state.matchLockDate+"」的成績。確定解鎖?")) return;
    busy("unlockBtn","解鎖中…");
    api({action:"unlockScores",userId:profile.userId,date:state.matchLockDate}).then(function(r){
      if(r&&r.ok){ toast("✓ 已解鎖,可重新編輯"); reload(); }
      else { toast((r&&r.error)||"解鎖失敗"); var b=document.getElementById("unlockBtn"); if(b){b.disabled=false;b.textContent="🔓 解鎖";} }
    });
  };
  var smSubmit=document.getElementById("smSubmit");
  if(smSubmit) smSubmit.onclick=function(){
    var d=(val("smDate")||"").trim();
    if(!d){ toast("請填比賽日期"); return; }
    var lines=[];
    document.querySelectorAll("#smBody tr[data-name]").forEach(function(tr){
      var o=(tr.querySelector(".sc-out").value||"").trim();
      var i=(tr.querySelector(".sc-in").value||"").trim();
      if(o!==""&&i!==""){ lines.push(tr.getAttribute("data-name")+" "+o+" "+i); }
    });
    if(!lines.length){ toast("請至少輸入一位的 OUT/IN"); return; }
    var techLines=[];
    document.querySelectorAll("#smTechRows .techrow").forEach(function(row){
      var aw=row.querySelector(".tr-award").value;
      var nm=row.querySelector(".tr-name").value;
      var ti=(row.querySelector(".tr-tiao").value||"1").trim();
      if(nm) techLines.push(aw+" "+nm+" "+ti);
    });
    if(state.matchLocked && state.matchLockDate===d){ toast("本場成績已鎖定,請先在下方「🔓 解鎖」再編輯"); return; }
    var resubmit = !!(state.ranking && state.ranking.date===d);
    var msg = resubmit
      ? ("「"+d+"」已有成績,將【覆蓋並重新計算差點】(不會重覆扣)。確定送出?")
      : ("送出 "+lines.length+" 筆成績"+(techLines.length?(" + "+techLines.length+" 筆技術獎"):"")+"("+d+"),計算排名並更新差點?");
    if(!confirm(msg)) return;
    busy("smSubmit","計算中…");
    api({action:"submitMatch",userId:profile.userId,date:d,text:lines.join("\n"),tech:techLines.join("\n")}).then(function(r){
      if(!r.ok){ toast(r.error||"更新失敗"); var b=document.getElementById("smSubmit"); if(b){b.disabled=false;b.textContent="送出(成績+技術獎)";} return; }
      toast("已計算 "+r.count+" 筆成績"+(r.techAdded?(",技術獎 "+r.techAdded+" 筆"):""));
      var inp=document.getElementById("smInput"); if(inp) inp.classList.add("hidden");
      var sf=document.getElementById("smSubmitFoot"); if(sf) sf.classList.add("hidden");
      var ttl=document.getElementById("smTitle"); if(ttl) ttl.textContent="計算結果 "+r.ranking.date;
      var res=document.getElementById("smResult");
      if(res){ res.classList.remove("hidden"); res.innerHTML=scoreResultHtml(r.ranking);
        var done=document.getElementById("smDone");
        if(done) done.onclick=function(){ var m=document.getElementById("scoreModal"); if(m) m.classList.add("hidden"); reload(); };
        var ex=document.getElementById("smExportPdf");
        if(ex) ex.onclick=function(){
          var d=ex.dataset.date||"";
          busy("smExportPdf","產生中…");
          api({action:"exportPdf",userId:profile.userId,date:d,folder:(state.event.pdfFolder||"")}).then(function(rr){
            var b=document.getElementById("smExportPdf"); if(b){b.disabled=false;b.textContent="📄 匯出 PDF";}
            if(!rr.ok){ toast(rr.error||"匯出失敗"); return; }
            toast("已存到「"+rr.folder+"」");
            var box=document.getElementById("smPdfLink");
            if(box) box.innerHTML='<a class="btn sm" style="margin:4px 0 0;display:block;text-align:center;text-decoration:none" href="'+rr.url+'" target="_blank" rel="noopener">開啟 PDF('+esc(rr.date)+')</a>';
            try{ if(window.liff&&liff.openWindow){ liff.openWindow({url:rr.url,external:true}); } else { window.open(rr.url,"_blank"); } }catch(e){}
          }).catch(function(){ toast("連線失敗"); var b=document.getElementById("smExportPdf"); if(b){b.disabled=false;b.textContent="📄 匯出 PDF";} });
        };
      }
    }).catch(function(){ toast("連線失敗"); var b=document.getElementById("smSubmit"); if(b){b.disabled=false;b.textContent="送出(成績+技術獎)";} });
  };
  var sr=document.getElementById("seasonReset");
  if(sr) sr.onclick=function(){
    var f=((state.event&&state.event.hcpResetFactor)||"0.85");
    if(!confirm("年初重設:用本年度區間的成績,把每位會員的年初差點重算為「(平均總桿−標準桿)×"+f+"」(倍率取自 Config),並把會費收款歸零?建議只在新年度開始時做一次。")) return;
    busy("seasonReset","重算中…");
    api({action:"seasonReset",userId:profile.userId}).then(function(r){
      toast(r.ok?("已重算 "+r.reset+" 人差點(×"+r.factor+")"+(r.kept?","+r.kept+" 人無成績維持原值":"")):(r.error||"重設失敗")); reload();
    });
  };
  var paySync=document.getElementById("paySync");
  if(paySync) paySync.onclick=function(){
    busy("paySync","處理中…");
    api({action:"ensurePayList",userId:profile.userId}).then(function(r){
      if(r && r.ok){ toast("✓ 已列入 "+r.count+" 位會員,可到試算表 Payments 分頁打 v"); setTimeout(reload,600); }
      else { var b=document.getElementById("paySync"); if(b){b.disabled=false;b.textContent="把目前會員列入 Payments 分頁";} toast((r&&r.error)||"處理失敗"); }
    });
  };
  var bs=document.getElementById("buildSeason");
  if(bs) bs.onclick=function(){
    busy("buildSeason","產生中…");
    api({action:"buildSeason",userId:profile.userId}).then(function(r){
      toast(r.ok?("已產生年總表("+r.members+"人 × "+r.months+"場),請到試算表「年總表」分頁查看"):(r.error||"產生失敗"));
      reload();
    });
  };
  var bsc=document.getElementById("buildSchedule");
  if(bsc) bsc.onclick=function(){
    busy("buildSchedule","建立中…");
    api({action:"buildSchedule",userId:profile.userId}).then(function(r){
      toast(r.ok?(r.existed?"行事曆已存在,未覆蓋你的編輯":"已建立行事曆,共 "+r.rows+" 場,請到試算表「行事曆」分頁編輯"):(r.error||"建立失敗"));
      reload();
    });
  };
  var claim=document.getElementById("claim");
  if(claim) claim.onclick=function(){
    if(!confirm("把自己設為管理員?設定後只有你能修改活動資訊與清空名單。")) return;
    api({action:"claimAdmin",userId:profile.userId}).then(function(r){
      toast(r.ok?"你已成為管理員":(r.error||"設定失敗")); reload();
    });
  };
  var rl=document.getElementById("reloadBtn");
  if(rl) rl.onclick=reload;
}

function after(msg){
  return function(r){
    if(r && r.ok===false){ toast("⚠ "+(r.error||"操作失敗,請再試一次")); reload(); }
    else { toast("✓ "+msg); reload(); }
  };
}
// 出席相關動作:後端已回傳最新名單+進度 → 就地更新即可,免再跑一次 bootstrap(省一趟往返)
function afterRoster(msg){
  return function(r){
    if(!r || r.ok===false){ toast("⚠ "+((r&&r.error)||"操作失敗,請再試一次")); return reload(); }
    toast("✓ "+msg);
    if(state && r.roster){ state.roster = r.roster; if(r.progress) state.progress = r.progress; rerenderKeepOpen ? rerenderKeepOpen() : render(); }
    else { reload(); }
  };
}
function val(id){var el=document.getElementById(id);return el?el.value:"";}
function busy(id,txt){var b=document.getElementById(id);if(b){if(!b.dataset.orig)b.dataset.orig=b.textContent;b.disabled=true;b.textContent=txt;}}
// 設定類儲存(收集所有 .adm 欄位):按鈕會顯示「儲存中…→✓ 已儲存」,失敗會還原並提示
function saveAdm(btnId, okMsg){
  var b=document.getElementById(btnId);
  var orig=b?(b.dataset.orig||b.textContent):"";
  if(b){b.dataset.orig=orig;b.disabled=true;b.textContent="儲存中…";}
  var p={action:"updateEvent",userId:profile.userId};
  document.querySelectorAll(".adm").forEach(function(el){p[el.dataset.k]=el.value;});
  api(p).then(function(r){
    if(r && r.ok===false){
      if(b){b.disabled=false;b.textContent=orig;}
      toast("⚠ "+(r.error||"儲存失敗,請再試一次"));
    }else{
      if(b){b.textContent="✓ 已儲存";}
      toast("✓ "+okMsg);
      setTimeout(reload,800);
    }
  });
}

var toastTimer;
function toast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(function(){t.classList.remove("show");},2200);
}
</script>
</body>
</html>
